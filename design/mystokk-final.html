<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyStokk — Final Mobile Prototype</title>
<style>
  :root{
    --navy:#0F2B54; --blue:#2E7CF6; --blue-d:#1E5FD0; --sky:#56C8FF; --ice:#E3EEFF;
    --bg:#FFFFFF; --line:#E8EDF5; --muted:#67768F; --text:#17233A;
    --green:#149A54; --green-bg:#E7F6EE; --amber:#B26205; --amber-bg:#FDF1E0;
    --red:#D93030; --red-bg:#FCEBEB; --violet:#6D5BE8; --violet-bg:#EFEDFC;
    --glass:rgba(252,253,255,.6); --gline:rgba(15,43,84,.08); --ghl:rgba(255,255,255,.85);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:#0A1830;display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text)}
  .frame{width:390px;height:844px;background:var(--bg);border-radius:54px;position:relative;overflow:hidden;
    box-shadow:0 42px 110px rgba(0,0,0,.6),inset 0 0 0 12px #0e2140,inset 0 0 0 14px #21395e}
  @media (max-width:430px){body{background:var(--bg)}
    .frame{width:100vw;height:100vh;border-radius:0;box-shadow:none}
    .statusbar .notch{display:none}}
  .statusbar{position:absolute;top:0;left:0;right:0;height:52px;z-index:65;display:flex;align-items:flex-end;
    justify-content:space-between;padding:0 30px 5px;font-size:15px;font-weight:600;color:var(--navy);pointer-events:none}
  .statusbar .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:118px;height:33px;background:#0A1830;border-radius:20px}
  .homebar{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:132px;height:5px;border-radius:3px;background:var(--navy);opacity:.18;z-index:75;pointer-events:none}

  .screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,.35,1);z-index:1;visibility:hidden}
  .screen.active{transform:translateX(0);z-index:5;visibility:visible}
  .screen.under{transform:translateX(-26%);z-index:2;visibility:visible}
  .screen.fade{transition:opacity .16s ease;transform:none;opacity:0}
  .screen.fade.active{opacity:1}
  .scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:0 18px;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}
  .pt-nav{padding-top:112px}.pt-tab{padding-top:60px}
  .pb-tab{padding-bottom:143px}.pb-cta{padding-bottom:132px}.pb-plain{padding-bottom:44px}
  .nav{position:absolute;top:0;left:0;right:0;z-index:40;padding:56px 18px 10px;display:flex;align-items:center;gap:10px;
    background:linear-gradient(rgba(255,255,255,.95) 72%,rgba(255,255,255,0))}
  .nav .title{font-size:17px;font-weight:800;color:var(--navy);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav .side{width:42px;display:flex}
  .navbtn{width:42px;height:42px;border-radius:21px;background:var(--glass);
    backdrop-filter:blur(28px) saturate(1.85);-webkit-backdrop-filter:blur(28px) saturate(1.85);
    border:1px solid var(--gline);box-shadow:inset 0 1px 0 var(--ghl),0 4px 14px rgba(15,43,84,.08);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s;position:relative}
  .navbtn:active{transform:scale(.9)}
  .dot{position:absolute;top:8px;right:9px;width:9px;height:9px;border-radius:5px;background:var(--red);border:1.5px solid #fff}
  .h1{font-size:29px;font-weight:800;letter-spacing:-.6px;color:var(--navy)}
  .h1small{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--navy)}
  .sub{font-size:14.5px;color:var(--muted);margin-top:3px}
  .sect{font-size:12.5px;font-weight:800;letter-spacing:.7px;color:var(--muted);text-transform:uppercase;margin:22px 2px 10px}

  /* floating glass tab bar with highlighted active tab */
  .tabbar{position:absolute;left:10px;right:10px;bottom:26px;z-index:50;height:80px;border-radius:34px;
    background:rgba(255,255,255,.62);backdrop-filter:blur(36px) saturate(1.9);-webkit-backdrop-filter:blur(36px) saturate(1.9);
    border:1px solid var(--gline);box-shadow:inset 0 1.5px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(255,255,255,.3),0 18px 50px rgba(15,43,84,.2);
    display:flex;padding:11px 4px 0}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#93A2BC;
    font-size:9.5px;font-weight:700;letter-spacing:-.15px;position:relative;z-index:1;padding-top:5px;white-space:nowrap;min-width:0}
  .tab svg{width:24px;height:24px}
  .tab:active{opacity:.55}
  .tab.on{color:var(--blue-d);font-weight:800}
  .tab.on::before{content:'';position:absolute;top:0;left:4px;right:4px;width:auto;height:58px;
    border-radius:19px;z-index:-1;background:linear-gradient(rgba(46,124,246,.17),rgba(46,124,246,.09));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 0 0 1px rgba(46,124,246,.2)}
  .tab .tbadge{position:absolute;margin-left:26px;margin-top:-2px;min-width:17px;height:17px;border-radius:9px;background:var(--red);
    color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:2}

  /* glass surfaces */
  .card,.row,.stat,.crow{background:var(--glass);backdrop-filter:blur(30px) saturate(1.85);-webkit-backdrop-filter:blur(30px) saturate(1.85);
    border:1px solid var(--gline);border-radius:18px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.95),inset 0 -1px 0 rgba(255,255,255,.25),0 10px 34px rgba(15,43,84,.09)}
  .card{padding:16px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;height:53px;border-radius:17px;
    font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s,opacity .1s;user-select:none}
  .btn:active{transform:scale(.98);opacity:.9}
  .btn-primary{background:var(--blue);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 8px 22px rgba(46,124,246,.32)}
  .btn-dark{background:var(--navy);color:#fff}
  .btn-ghost{background:var(--glass);color:var(--navy);border:1px solid var(--gline);
    backdrop-filter:blur(14px) saturate(1.6);-webkit-backdrop-filter:blur(14px) saturate(1.6);
    box-shadow:inset 0 1px 0 var(--ghl),0 4px 12px rgba(15,43,84,.06)}
  .btn-soft{background:var(--ice);color:var(--blue-d)}
  .btn-green{background:var(--green);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 8px 20px rgba(20,154,84,.32)}
  .btn-danger{background:var(--red-bg);color:var(--red)}
  .btn.sm{height:44px;font-size:14.5px;border-radius:13px}
  .btn.disabled{opacity:.42;pointer-events:none}
  .cta{position:absolute;left:0;right:0;bottom:0;z-index:45;padding:12px 18px 32px;
    background:linear-gradient(rgba(255,255,255,0),rgba(255,255,255,.94) 44%)}
  .searchpill{display:flex;align-items:center;gap:9px;height:45px;background:var(--glass);border:1px solid var(--gline);
    backdrop-filter:blur(24px) saturate(1.7);-webkit-backdrop-filter:blur(24px) saturate(1.7);box-shadow:inset 0 1px 0 rgba(255,255,255,.95);
    border-radius:15px;padding:0 14px;color:var(--muted);font-size:15px;margin:10px 0 10px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;height:35px;display:flex;align-items:center;gap:6px;padding:0 14px;border-radius:18px;font-size:13px;
    font-weight:700;background:var(--glass);border:1px solid var(--gline);color:var(--muted);cursor:pointer;transition:transform .1s;
    box-shadow:inset 0 1px 0 var(--ghl),0 3px 8px rgba(15,43,84,.05)}
  .chip:active{transform:scale(.95)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.22)}
  .row{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:transform .1s;position:relative}
  .row:active{transform:scale(.985)}
  .thumb{width:52px;height:52px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;color:#fff;letter-spacing:.3px}
  .mid{flex:1;min-width:0}
  .t1{font-size:15.5px;font-weight:750;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t2{font-size:12.5px;color:var(--muted);margin-top:2.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .end{text-align:right;flex:none}
  .p1{font-size:14.5px;font-weight:800;color:var(--navy)}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3.5px 9px;border-radius:9px;font-size:11px;font-weight:800;letter-spacing:.2px}
  .b-green{background:var(--green-bg);color:var(--green)}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-red{background:var(--red-bg);color:var(--red)}
  .b-blue{background:var(--ice);color:var(--blue-d)}
  .b-gray{background:#EEF1F7;color:var(--muted)}
  .chev{color:#C3CDDF;flex:none}
  .seg{display:flex;background:rgba(233,237,245,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--gline);border-radius:13px;padding:3px;margin:12px 0 14px}
  .seg div{flex:1;text-align:center;padding:9.5px 0;border-radius:10px;font-size:13.5px;font-weight:800;color:var(--muted);cursor:pointer}
  .seg div.on{background:#fff;color:var(--navy);box-shadow:inset 0 1px 0 var(--ghl),0 2px 8px rgba(15,43,84,.12)}
  .input{margin-bottom:14px}
  .input label{display:block;font-size:13px;font-weight:800;color:var(--navy);margin-bottom:7px}
  .input label i{font-style:normal;color:var(--red)}
  .input input,.input select,.input textarea{width:100%;height:51px;border:1px solid var(--gline);border-radius:13px;
    background:var(--glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:inset 0 1px 0 var(--ghl);
    padding:0 14px;font-size:15.5px;color:var(--text);font-family:inherit;outline:none;appearance:none;-webkit-appearance:none}
  .input select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2367768F' stroke-width='2.4' stroke-linecap='round'><path d='m6 9 6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
  .input textarea{height:92px;padding-top:13px;resize:none}
  .input input:focus,.input textarea:focus,.input select:focus{border-color:var(--blue)}
  .err{color:var(--red);font-size:12.5px;font-weight:700;margin-top:6px;display:none}
  .fab{position:absolute;right:18px;bottom:123px;z-index:46;width:57px;height:57px;border-radius:29px;
    background:var(--glass);backdrop-filter:blur(20px) saturate(1.8);-webkit-backdrop-filter:blur(20px) saturate(1.8);
    border:1px solid var(--gline);color:var(--navy);display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 1px 0 var(--ghl),0 12px 30px rgba(15,43,84,.22);cursor:pointer;transition:transform .12s}
  .fab:active{transform:scale(.9)}
  .stockbar{display:flex;height:5px;border-radius:3px;overflow:hidden;background:#EDF1F8;margin-top:7px}
  .stockbar i{height:100%}
  .sb-av{background:#20B368}.sb-res{background:#F0A030}
  .legend{display:flex;gap:14px;margin-top:10px;font-size:12px;font-weight:700;color:var(--muted);flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend b{width:9px;height:9px;border-radius:3px;display:inline-block}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stat{padding:14px;cursor:pointer;transition:transform .1s}
  .stat:active{transform:scale(.97)}
  .stat .ic{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
  .stat .v{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
  .stat .l{font-size:12px;color:var(--muted);font-weight:700;margin-top:1px}
  .steps{display:flex;gap:6px;margin:4px 0 16px}
  .steps i{flex:1;height:4px;border-radius:2px;background:#E2E8F2}
  .steps i.on{background:var(--blue)}
  .crow{display:flex;align-items:center;gap:12px;border-radius:15px;padding:12px 13px;margin-bottom:9px;cursor:pointer}
  .crow.on{border-color:rgba(46,124,246,.6);background:rgba(232,241,255,.85)}
  .cbox{width:23px;height:23px;border-radius:8px;border:2px solid #C6D1E4;flex:none;display:flex;align-items:center;justify-content:center;background:#fff}
  .crow.on .cbox{background:var(--blue);border-color:var(--blue)}
  .cbox svg{opacity:0}.crow.on .cbox svg{opacity:1}
  .avatar{width:45px;height:45px;border-radius:23px;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
  .sheet-wrap{position:absolute;inset:0;z-index:80;visibility:hidden}
  .sheet-wrap.open{visibility:visible}
  .sheet-bg{position:absolute;inset:0;background:rgba(10,24,48,.4);opacity:0;transition:opacity .25s}
  .sheet-wrap.open .sheet-bg{opacity:1}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.72);
    backdrop-filter:blur(42px) saturate(1.9);-webkit-backdrop-filter:blur(42px) saturate(1.9);
    border:1px solid rgba(255,255,255,.85);border-bottom:none;border-radius:34px 34px 0 0;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 -18px 60px rgba(15,43,84,.22);
    padding:10px 20px 38px;transform:translateY(105%);transition:transform .3s cubic-bezier(.32,.72,.35,1);max-height:88%;overflow-y:auto}
  .sheet-wrap.open .sheet{transform:translateY(0)}
  .grab{width:40px;height:5px;border-radius:3px;background:rgba(15,43,84,.2);margin:4px auto 14px}
  .sheet h3{font-size:19px;font-weight:800;color:var(--navy)}
  .sheet .desc{font-size:13.5px;color:var(--muted);margin-top:3px;margin-bottom:14px;line-height:1.5}
  .act{display:flex;align-items:center;gap:13px;padding:14px 2px;border-bottom:1px solid var(--line);cursor:pointer;font-size:15.5px;font-weight:700;color:var(--navy)}
  .act:last-of-type{border-bottom:none}
  .act:active{opacity:.55}
  .act .ic{width:37px;height:37px;border-radius:12px;background:var(--ice);display:flex;align-items:center;justify-content:center;flex:none}
  .act.danger{color:var(--red)}.act.danger .ic{background:var(--red-bg)}
  .qty{display:flex;align-items:center;border:1px solid var(--gline);border-radius:13px;overflow:hidden;
    background:var(--glass);box-shadow:inset 0 1px 0 var(--ghl)}
  .qty div{width:44px;height:49px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:var(--blue);cursor:pointer}
  .qty div:active{background:#F0F5FE}
  .qty input{flex:1;border:none;text-align:center;font-weight:800;font-size:16px;outline:none;height:49px;font-family:inherit;color:var(--navy);min-width:0;background:transparent}
  .bubble{max-width:82%;border-radius:16px;padding:11px 14px;margin-bottom:10px;font-size:14px;line-height:1.4;
    border:1px solid var(--gline);box-shadow:inset 0 1px 0 var(--ghl),0 4px 12px rgba(15,43,84,.05)}
  .bub-them{background:rgba(240,244,250,.85)}
  .bub-you{background:rgba(222,236,255,.9);margin-left:auto}
  .bubble .who{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between;gap:14px}
  .bubble .big{font-size:15px;font-weight:800;color:var(--navy)}
  .bubble .note{font-style:italic;color:var(--muted);margin-top:2px}
  .bubble .time{font-size:11px;color:#9AA7BF;margin-top:5px}
  .toast{position:absolute;left:50%;bottom:126px;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;
    padding:12px 22px;border-radius:14px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;z-index:95;pointer-events:none;white-space:nowrap;max-width:86%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .linkpill{display:flex;align-items:center;gap:10px;background:rgba(241,245,252,.85);border:1.5px dashed #B7CBEC;border-radius:14px;
    padding:13px 15px;font-size:13.5px;color:var(--blue-d);font-weight:700;word-break:break-all;cursor:pointer}
  .empty{text-align:center;padding:54px 30px;color:var(--muted)}
  .empty .eic{width:74px;height:74px;border-radius:24px;background:var(--ice);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  .empty h4{font-size:16.5px;font-weight:800;color:var(--navy);margin-bottom:5px}
  .empty p{font-size:13.5px;line-height:1.5}
  .note{display:flex;gap:12px;align-items:flex-start;background:rgba(255,249,236,.92);border:1px solid #F0E0BC;border-radius:14px;padding:13px 14px;font-size:13px;line-height:1.5;color:#6B5518}
  .infonote{display:flex;gap:12px;align-items:flex-start;background:rgba(240,246,255,.92);border:1px solid #D6E5FB;border-radius:14px;padding:13px 14px;font-size:13px;line-height:1.5;color:var(--text)}
  .kv{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--line);font-size:14.5px;gap:14px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted);font-weight:600;flex:none}
  .kv .v{font-weight:800;color:var(--navy);text-align:right}
  .doc{display:flex;align-items:center;gap:12px;background:var(--glass);border:1px solid var(--gline);
    box-shadow:inset 0 1px 0 var(--ghl);border-radius:13px;padding:12px 14px;margin-bottom:9px;cursor:pointer}
  .doc:active{opacity:.6}
  .doc .ext{margin-left:auto;font-size:11.5px;font-weight:800}
  .catchip{display:inline-flex;height:34px;align-items:center;padding:0 14px;border-radius:17px;border:1px solid var(--gline);
    background:var(--glass);box-shadow:inset 0 1px 0 var(--ghl);font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;margin:0 8px 8px 0}
  .catchip.on{border-color:rgba(46,124,246,.55);color:var(--blue-d);background:rgba(232,241,255,.9)}
  .toggle{width:51px;height:31px;border-radius:16px;background:#E9E9EB;position:relative;cursor:pointer;transition:background .25s;flex:none}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:14px;background:#fff;box-shadow:0 3px 8px rgba(0,0,0,.15),0 1px 1px rgba(0,0,0,.08);transition:left .25s cubic-bezier(.3,.9,.4,1.1)}
  .toggle.on{background:#34C759}
  .toggle.on::after{left:22px}
  .prose{font-size:14.5px;line-height:1.6;color:var(--text)}
  .prose h4{font-size:15.5px;font-weight:800;color:var(--navy);margin:16px 0 6px}
  .prose p{margin-bottom:10px}
  .pop-wrap{position:absolute;inset:0;z-index:86;visibility:hidden}
  .pop-wrap.open{visibility:visible}
  .pop-bg{position:absolute;inset:0;background:rgba(10,24,48,.26);opacity:0;transition:opacity .2s}
  .pop-wrap.open .pop-bg{opacity:1}
  .pop{position:absolute;top:106px;right:16px;width:258px;background:rgba(255,255,255,.8);
    backdrop-filter:blur(36px) saturate(1.9);-webkit-backdrop-filter:blur(36px) saturate(1.9);
    border:1px solid rgba(255,255,255,.9);border-radius:24px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 24px 60px rgba(15,43,84,.26);
    padding:14px 15px 8px;transform:scale(.82) translateY(-8px);transform-origin:top right;opacity:0;
    transition:all .22s cubic-bezier(.34,1.35,.5,1)}
  .pop-wrap.open .pop{transform:scale(1) translateY(0);opacity:1}
  .pop-head{display:flex;align-items:center;gap:11px;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:4px}
  .pop-head b{font-size:15px;color:var(--navy);display:block}
  .pop-head span{font-size:11.5px;color:var(--muted);font-weight:600}
  .pop .act{padding:12px 2px;font-size:14.5px}
  .pop .act .ic{width:34px;height:34px;border-radius:11px}
  .otp{display:flex;gap:9px;justify-content:center;margin:20px 0 12px}
  .otp input{width:46px;height:56px;text-align:center;font-size:22px;font-weight:800;border:1.5px solid var(--gline);
    border-radius:13px;outline:none;background:var(--glass);box-shadow:inset 0 1px 0 var(--ghl);color:var(--navy)}

SCREENS.faq=`
 ${nav('FAQ','pop()')}
 <div class="scroll pt-nav pb-plain prose">
  <h4>What is MyStokk?</h4>
  <p>MyStokk is a private B2B platform for trading and distribution businesses to share live stock, reserve and negotiate inventory, and pass offers along to trusted contacts — never to the open market.</p>
  <h4>Who can see my inventory?</h4>
  <p>Only the vendors you explicitly share an item with, or anyone you send a public share link to. Your catalog is never publicly listed or searchable.</p>
  <h4>How do reservations and negotiation work?</h4>
  <p>A buyer reserves a quantity at your listed or an offered price. From there each side can counter, accept, or reject. Negotiation is capped at 3 rounds per side, and the full history is kept on the reservation.</p>
  <h4>What happens when I share a received item?</h4>
  <p>Your contact sees the item with your price and remark. The original supplier's identity and price are never revealed — that's the MyStokk privacy chain.</p>
 </div>`;

/* ================= CHROME ================= */
function nav(title,back,right){
 return `<div class="nav"><div class="side">${back?`<div class="navbtn" onclick="${back}">${ic('back','#0F2B54')}</div>`:''}</div>
   <div class="title">${title}</div><div class="side" style="justify-content:flex-end">${right||''}</div></div>`;
}
function cluster(){
 return `<div style="display:flex;gap:9px;align-items:center">
   <div class="navbtn" onclick="push('notifications')">${ic('bell','#0F2B54')}<div class="dot"></div></div>
   <div class="avatar" style="width:42px;height:42px;border-radius:21px;background:${G.nav};font-size:13px;cursor:pointer" onclick="openMenu()">EG</div></div>`;
}
function tabbar(on){
 const t=(id,icn,lbl,badge,fx)=>`<div class="tab ${on===id?'on':''}" style="flex:${fx}" onclick="setTab('${id}')">${badge?'<span class="tbadge">'+badge+'</span>':''}${ic(icn,'currentColor',24)}<span>${lbl}</span></div>`;
 return `<div class="tabbar">
   ${t('home','home','Home',0,'.78')}${t('inventory','box','My inventory',0,'1.08')}${t('received','inbox','Received',1,'.88')}${t('reserve','cal','Reservation Hub',2,'1.26')}
 </div>`;
}

/* ================= ENGINE ================= */
const TABS=['home','inventory','received','reserve','network'];
function el(id){
 let d=frame.querySelector(`[data-s="${id}"]`);
 if(!d){
  d=document.createElement('div');
  d.className='screen'+((TABS.includes(id)||['welcome','shareDone'].includes(id))?' fade':'');
  d.dataset.s=id; d.innerHTML=SCREENS[id];
  frame.insertBefore(d,$('#toast'));
 }
 return d;
}
function render(){
 frame.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','under'));
 const cur=el(stack[stack.length-1]);
 if(!cur.classList.contains('fade')){void cur.offsetWidth;}
 cur.classList.add('active');
 if(stack.length>1){
  const prev=el(stack[stack.length-2]);
  if(!cur.classList.contains('fade'))prev.classList.add('under');
 }
}
function push(id){stack.push(id);render()}
function pop(){if(stack.length>1){stack.pop();render()}}
function replaceTop(id){stack[stack.length-1]=id;const old=frame.querySelector(`[data-s="${id}"]`);if(old)old.remove();render()}
function setTab(id){activeTab=id;stack=[id];render()}
function enterApp(){activeTab='home';stack=['home'];render()}
function signOut(){stack=['welcome'];render()}
function goRoot(){stack=[activeTab||'home'];render()}

let sheetWrap=null;
function openSheet(id){
 if(sheetWrap)sheetWrap.remove();
 sheetWrap=document.createElement('div');
 sheetWrap.className='sheet-wrap';
 sheetWrap.innerHTML=`<div class="sheet-bg" onclick="closeSheet()"></div><div class="sheet"><div class="grab"></div>${SHEETS[id]}</div>`;
 frame.appendChild(sheetWrap);
 requestAnimationFrame(()=>requestAnimationFrame(()=>sheetWrap.classList.add('open')));
}
function closeSheet(){
 if(!sheetWrap)return;
 sheetWrap.classList.remove('open');
 setTimeout(()=>{sheetWrap&&sheetWrap.remove();sheetWrap=null;},320);
}
let popWrap=null;
function openMenu(){
 if(popWrap)popWrap.remove();
 popWrap=document.createElement('div');
 popWrap.className='pop-wrap';
 popWrap.innerHTML=`<div class="pop-bg" onclick="closeMenu()"></div><div class="pop">
   <div class="pop-head"><div class="avatar" style="width:42px;height:42px;background:${G.nav}">EG</div>
     <div><b>Ever Global</b><span>pateldarshil664@gmail.com</span></div></div>
   ${[['user','Business profile','profile'],['gear','Settings','settings'],['bell','Notifications','notifications'],['mail','Contact','contact']].map(r=>`
   <div class="act" onclick="closeMenu();push('${r[2]}')"><div class="ic">${ic(r[0],'#1E5FD0',18)}</div>${r[1]}<span class="chev" style="margin-left:auto">${ic('chev','#C3CDDF',16)}</span></div>`).join('')}
   <div class="act danger" onclick="closeMenu();signOut()"><div class="ic">${ic('off','#D93030',18)}</div>Log out</div>
 </div>`;
 frame.appendChild(popWrap);
 requestAnimationFrame(()=>requestAnimationFrame(()=>popWrap.classList.add('open')));
}
function closeMenu(){
 if(!popWrap)return;
 popWrap.classList.remove('open');
 setTimeout(()=>{popWrap&&popWrap.remove();popWrap=null;},230);
}
let toastT=null;
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1800)}
function chipOn(e){e.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));e.classList.add('on')}
function segSwap(e,showId,hideId){
 e.parentElement.querySelectorAll('div').forEach(d=>d.classList.remove('on'));e.classList.add('on');
 const sc=e.closest('.screen')||frame;
 const s=sc.querySelector('#'+showId),h=sc.querySelector('#'+hideId);
 if(s)s.style.display='';if(h)h.style.display='none';
}
function shCount(){
 const n=document.querySelectorAll('#shNet .crow.on').length;
 const c=document.getElementById('shCount');if(c)c.textContent=n+' selected';
}
function qch(d){const q=document.getElementById('q1');if(q)q.value=Math.max(0,(parseInt(q.value.replace(/,/g,''))||0)+d)}
function qch2(d){const q=document.getElementById('q2');if(q){q.value=Math.max(0,(parseInt(q.value.replace(/,/g,''))||0)+d);chkQty()}}
function chkQty(){
 const q=document.getElementById('q2'),e=document.getElementById('qErr'),b=document.getElementById('resBtn');
 if(!q||!e||!b)return;
 const v=parseInt(q.value.replace(/,/g,''))||0;
 const over=v>50000;
 e.style.display=over?'block':'none';
 q.style.color=over?'var(--red)':'var(--navy)';
 b.classList.toggle('disabled',over||v<1);
}
function otpIn(el){
 el.value=el.value.replace(/\D/g,'');
 if(el.value&&el.nextElementSibling&&el.nextElementSibling.tagName==='INPUT')el.nextElementSibling.focus();
}
function venCats(sel){
 const w=sel.closest('.screen').querySelector('#venCatsWrap');
 if(w)w.style.display=sel.value?'':'none';
}
function toggleFab(){
 const sc=frame.querySelector('[data-s="network"]');if(!sc)return;
 const b=sc.querySelector('#fabBtn'),m=sc.querySelector('#fabMenu');
 if(b)b.classList.toggle('open');if(m)m.classList.toggle('open');
}
render();
</script>
